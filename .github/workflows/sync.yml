name: grovemgr-sync
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: BD -> Google Sheets
        run: |
          curl -sS -X POST "${BACKEND_URL}/api/sync/to-sheet" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"days":30}'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
      - name: Google Sheets -> BD
        run: |
          curl -sS -X POST "${BACKEND_URL}/api/sync/from-sheet" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"days":30}'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}